<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Station – Funkübung</title>
<!--
  ============================================================================
  FUNKÜBUNG – STATIONSOBERFLÄCHE (station.html)  ·  Layout: Variante B
  ============================================================================
  Version: 1.1.1 (eigene Versionierung, unabhängig von APP_INFO.version des
  Planungstools; zentral in STATION_APP_INFO.version, im Footer sichtbar).
  Versionsverlauf: siehe CHANGELOG.md.
  ============================================================================
  Aufruf per QR:  station.html?s=<Stationsnummer>&fhz=<Fahrzeug-ID>
  z. B. station.html?s=1&fhz=elw

  Zeigt die Grunddaten der Station (Übungskopf, Einsatzort, Fahrzeug, Aufgabe
  inkl. Beschreibung, Lagebild passend zum Fahrzeug). Tablet: zweispaltig
  (Aufgabe | Lagebild), Handy: einspaltig.

  LÖSUNGSZEICHEN: wird NICHT offen angezeigt. Es wird erst über einen
  POSITIONSCODE freigeschaltet:
    - Format W<Wortnummer>P<Zeichenposition-im-Wort> (z. B. W2P3); ALLE Zeichen
      erhalten einen Code, inkl. Leer-/Satzzeichen. Die Code-Erzeugung erfolgt im
      Planungstool; station.html RECHNET NICHT, sondern VERGLEICHT nur.
    - station.html VERGLEICHT die Eingabe mit dem je (Fahrzeug × Station)
      hinterlegten Feld assignments[fhz][s].code aus data/uebung.json
    - Eingabe robust: Groß-/Kleinschreibung egal, alle Leerzeichen ignoriert
      ("w1p13", "W1P13", "W 1 P 13" gelten gleich)
    - nur bei korrektem Code wird das Lösungszeichen für genau diese
      Fahrzeug-/Stationskombination angezeigt
  Keine Versuchssperre, keine Online-Auswertung, keine Rückmeldung, keine Kette.

  Liest data/uebung.json (Base64-Payload, nur leichte Verschleierung). Kein
  localStorage, keine Planungslogik. index.html wird nicht berührt.
  ============================================================================
-->
<style>
  :root {
    --bg-0:#101216; --bg-1:#14161a; --bg-2:#1b1e23;
    --line:#2c313a; --line-soft:#242931; --text:#e7ebf0; --text-muted:#99a0aa; --text-faint:#6b727c;
    --red:#861619; --red-strong:#a11f27; --red-soft:rgba(134,22,25,.18); --ok:#3fae6b; --warn:#e0a32e;
    --radius:14px; --radius-sm:9px;
    --font:"Segoe UI","Roboto","Helvetica Neue",system-ui,-apple-system,sans-serif;
    --font-mono:"Consolas","SF Mono","Roboto Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg-0);color:var(--text);font-family:var(--font);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1040px;margin:0 auto;padding:18px 16px 44px;}
  .meta{font-size:.82rem;color:var(--text-faint);text-align:center;margin-bottom:12px;}

  .topbar{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius);position:relative;overflow:hidden;margin-bottom:16px;}
  .topbar::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);}
  .st-no{flex:0 0 auto;width:58px;height:58px;border-radius:12px;background:var(--red-soft);border:2px solid var(--red);display:grid;place-items:center;font-family:var(--font-mono);font-weight:800;font-size:2rem;color:#fff;}
  .topbar h1{margin:0;font-size:1.35rem;font-weight:700;line-height:1.2;}
  .topbar .veh{margin-top:2px;font-size:.95rem;color:var(--text-muted);}
  .topbar .veh b{color:var(--text);font-weight:600;}

  .grid{display:grid;grid-template-columns:1fr;gap:16px;}
  @media (min-width:760px){ .grid{grid-template-columns:1fr 1fr;align-items:start;} }
  .card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;}
  .label{font-size:.74rem;letter-spacing:.09em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
  .task{font-size:1.05rem;line-height:1.55;color:var(--text-muted);font-weight:400;}
  .aufgabe-text{font-size:1.4rem;line-height:1.35;color:var(--text);font-weight:700;}
  .aufgabe-text + .task{margin-top:16px;}

  .imgs{display:flex;flex-direction:column;gap:12px;}
  .imgfig{margin:0;}
  .imgfig img{display:block;width:100%;height:auto;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--bg-1);cursor:zoom-in;}
  .imgfig img:focus-visible{outline:2px solid var(--red);outline-offset:2px;}
  .muted{font-size:.95rem;color:var(--text-faint);font-style:italic;}

  /* Lagebild-Lightbox: Tipp/Klick aufs Lagebild → große Vollbild-Ansicht.
     Schließt per Tipp/Klick irgendwo, ×-Button oder Escape (Tablet/Handy/Desktop). */
  .lb{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(8,9,11,.92);}
  .lb.open{display:flex;}
  .lb img{max-width:100%;max-height:100%;width:auto;height:auto;border-radius:var(--radius-sm);box-shadow:0 12px 44px rgba(0,0,0,.6);cursor:zoom-out;}
  .lb-close{position:absolute;top:12px;right:14px;width:46px;height:46px;display:grid;place-items:center;background:rgba(0,0,0,.5);border:1px solid var(--line);border-radius:50%;color:#fff;font-size:1.9rem;line-height:1;cursor:pointer;}
  .lb-close:hover{background:rgba(0,0,0,.7);}

  /* Lösungszeichen – Freischaltung per Positionscode */
  .code-card{margin-top:16px;}
  .code-row{display:flex;flex-wrap:wrap;gap:10px;}
  .code-row input{flex:1 1 220px;min-width:0;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--text);font:inherit;font-size:1.05rem;letter-spacing:.04em;padding:12px 14px;text-transform:uppercase;}
  .code-row input::placeholder{color:var(--text-faint);text-transform:none;letter-spacing:0;}
  .code-row input:focus{outline:none;border-color:var(--red);background:#1d2026;}
  .btn{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;font:inherit;font-size:1rem;font-weight:600;padding:12px 20px;border-radius:var(--radius-sm);border:1px solid var(--red);background:var(--red);color:#fff;cursor:pointer;transition:background .14s,border-color .14s;}
  .btn:hover{background:var(--red-strong);border-color:var(--red-strong);}
  .code-msg{margin:12px 0 0;font-size:.95rem;min-height:1.2em;}
  .code-msg.ok{color:var(--ok);} .code-msg.warn{color:var(--warn);}
  .gate-hint{margin:10px 0 12px;font-size:.92rem;color:var(--text-muted);}
  .gate-part{padding:10px 0;}
  .gate-part + .gate-part{border-top:1px solid var(--line-soft);margin-top:4px;}
  .gate-opts{display:flex;flex-wrap:wrap;gap:8px;}
  .gate-opt{font:inherit;font-size:1rem;padding:11px 16px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--bg-1);color:var(--text);cursor:pointer;transition:border-color .14s,background .14s;}
  .gate-opt:hover:not(:disabled){border-color:var(--red);}
  .gate-opt:disabled{cursor:default;opacity:.85;}
  .gate-opt.correct{border-color:var(--ok);background:rgba(63,174,107,.15);color:var(--ok);font-weight:600;}
  .gate-opt.wrong{border-color:var(--warn);}
  .mc-card{margin-top:16px;}
  .mc-q .task{margin-bottom:10px;}
  .relay-send-card{margin-top:16px;border-left:3px solid var(--status-prog);}
  .relay-send + .relay-send{border-top:1px solid var(--line-soft);margin-top:10px;padding-top:10px;}
  .relay-word{font-family:var(--font-mono);font-size:1.8rem;font-weight:800;letter-spacing:.06em;color:var(--text);background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 14px;margin-top:6px;word-break:break-word;}
  .relay-recv-card{margin-top:16px;}

  /* Mastercode der Übungsleitung: bewusst zurückhaltend, kein auffälliges Feld. */
  .master-card{margin-top:18px;text-align:center;}
  .master-toggle{font:inherit;font-size:.82rem;color:var(--text-faint);background:none;border:none;cursor:pointer;padding:6px 10px;text-decoration:underline;text-underline-offset:3px;}
  .master-toggle:hover{color:var(--text-muted);}
  .master-box{max-width:360px;margin:10px auto 0;text-align:left;}

  .letterbox{display:flex;align-items:center;gap:18px;margin-top:14px;}
  .letter{flex:0 0 auto;width:104px;height:104px;border-radius:var(--radius);display:grid;place-items:center;background:var(--bg-1);border:2px solid var(--ok);font-family:var(--font-mono);font-weight:800;font-size:3.4rem;color:#fff;}
  .letter.space,.letter.empty{color:var(--text-faint);border-color:var(--line);font-weight:400;}
  .letter-note{font-size:1rem;color:var(--text-muted);} .letter-note b{color:var(--text);}

  .error{margin-top:16px;background:var(--red-soft);border:1px solid var(--red);border-radius:var(--radius);padding:16px 18px;}
  .error h2{margin:0 0 6px;font-size:1.05rem;color:var(--red-strong);}
  .error p{margin:0;font-size:.95rem;color:var(--text-muted);}
  .error code{font-family:var(--font-mono);color:var(--text);background:var(--bg-1);padding:1px 5px;border-radius:4px;}
  .foot{margin-top:22px;text-align:center;font-size:.74rem;color:var(--text-faint);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="meta" id="exMeta"></div>
    <div id="content"><p class="muted">Lade Stationsdaten …</p></div>
    <div class="foot" id="stFoot">Stationsoberfläche</div>
  </div>
  <div class="lb" id="lb" aria-hidden="true" role="dialog" aria-label="Lagebild groß">
    <button type="button" class="lb-close" id="lbClose" aria-label="Schließen">&times;</button>
    <img id="lbImg" alt="">
  </div>
<script>
(function () {
  "use strict";
  /* Eigene Version der Stationsoberfläche (unabhängig vom Planungstool).
     Bei künftigen Änderungen an station.html erhöhen; mit Kopf-Kommentar synchron halten. */
  var STATION_APP_INFO = { name: "Stationsoberfläche", version: "1.1.1" };

  function escapeHTML(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
  /* Datum YYYY-MM-DD → DD.MM.YYYY (sonst unverändert anzeigen). */
  function fmtDate(d){var s=String(d==null?"":d).trim();var m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(s);return m?(m[3]+"."+m[2]+"."+m[1]):s;}
  function escapeAttr(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function nonEmpty(v){return v!=null&&String(v).trim()!=="";}
  function getParam(n){try{return new URLSearchParams(window.location.search).get(n);}catch(e){return null;}}
  function decodeBase64Utf8(b64){var bin=atob(b64),by=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)by[i]=bin.charCodeAt(i);return new TextDecoder("utf-8").decode(by);}
  function showError(t,d){document.getElementById("content").innerHTML='<div class="error"><h2>'+escapeHTML(t)+'</h2><p>'+d+'</p></div>';}
  /* Positionscode robust normalisieren: Großschreibung, alle Whitespaces raus. */
  function normCode(s){return String(s==null?"":s).toUpperCase().replace(/\s+/g,"");}

  /* --- Freischalt-Wörter ----------------------------------------------------
     Verschleierungs-Hash (cyrb53, gesalzen) – KEIN Krypto, identisch zu
     index.html/elw.html. Prüft die vor Ort gelöste „Antwort der Besatzung"
     (assignments[fhz][s].hashFhz) sowie das von der ELW heruntergefunkte
     „Rückwort des ELW" (hashElw), bevor das Positionscode-Feld freigegeben wird.
     normWord = Kleinschreibung, alle Whitespaces raus. Salt = name+date. */
  function normWord(s){return String(s==null?"":s).toLowerCase().replace(/\s+/g,"");}
  function saltFromMeta(meta){var m=meta||{};return (m.name||"")+"|"+(m.date||"");}
  function hashWord(word,salt){
    var str=String(salt==null?"":salt)+""+normWord(word);
    var h1=0xdeadbeef,h2=0x41c6ce57,i,ch;
    for(i=0;i<str.length;i++){ch=str.charCodeAt(i);h1=Math.imul(h1^ch,2654435761);h2=Math.imul(h2^ch,1597334677);}
    h1=Math.imul(h1^(h1>>>16),2246822507);h1^=Math.imul(h2^(h2>>>13),3266489909);
    h2=Math.imul(h2^(h2>>>16),2246822507);h2^=Math.imul(h1^(h1>>>13),3266489909);
    return ("00000000"+(h2>>>0).toString(16)).slice(-8)+("00000000"+(h1>>>0).toString(16)).slice(-8);
  }

  function lagebildHtml(station, fhz){
    var images=Array.isArray(station.images)?station.images:[];
    var shown=images.length<=1?images:images.filter(function(im){return Array.isArray(im.vehicleIds)&&im.vehicleIds.indexOf(fhz)!==-1;});
    if(!shown.length) return '';  /* Kein Lagebild → Kartenbereich wird in render() komplett ausgeblendet. */
    /* Bildunterschrift (im.title, z. B. „Lagebild 1") wird bewusst NICHT angezeigt;
       title bleibt als alt-Text für Barrierefreiheit erhalten. */
    return '<div class="imgs">'+shown.map(function(im){
      return '<figure class="imgfig"><img class="lb-trigger" src="'+escapeAttr(im.url)+'" alt="'+escapeAttr(im.title||"Lagebild")+'" loading="lazy" tabindex="0" role="button" aria-label="Lagebild vergrößern"></figure>';
    }).join("")+'</div>';
  }

  function render(data, station, vehicle, fhz){
    /* Zuordnung (char + code + laufnr) für dieses Fahrzeug an dieser ECHTEN Station
       (station.nr = echte Stationsnummer aus der URL – bleibt intern erhalten). */
    var assign = (data.assignments && data.assignments[fhz]) ? data.assignments[fhz][String(station.nr)] : null;
    /* Sichtbare Laufnummer = Position der echten Station in der Fahrzeugroute,
       direkt aus assign.laufnr (wird vom Planungstool exportiert). */
    var laufnr = (assign && typeof assign.laufnr==="number" && assign.laufnr>0) ? assign.laufnr : null;
    if(!laufnr){ showError("Anzeige nicht möglich","Die Laufnummer dieser Station für dieses Fahrzeug konnte nicht ermittelt werden. Bitte die Übungsdaten (data/uebung.json) im Planungstool neu exportieren und hochladen."); return; }

    /* Einsatzort der ECHTEN Station: Adresse → (Stationsort) → Titel → neutral. */
    var ort = nonEmpty(station.address) ? station.address
            : nonEmpty(station.location) ? station.location
            : nonEmpty(station.ort) ? station.ort
            : nonEmpty(station.einsatzort) ? station.einsatzort
            : nonEmpty(station.title) ? station.title
            : "Einsatzort nicht hinterlegt";

    var meta=data.meta||{};
    var ex=[];
    if(nonEmpty(meta.name)) ex.push(escapeHTML(meta.name));
    if(nonEmpty(meta.date)) ex.push(escapeHTML(fmtDate(meta.date)));
    if(nonEmpty(meta.time)) ex.push(escapeHTML(meta.time)+' Uhr');
    document.getElementById("exMeta").innerHTML=ex.join(' · ');

    /* Gemeinsame Karte „Aufgabe": zuerst die Stationsüberschrift (station.title)
       deutlich hervorgehoben, darunter – falls vorhanden – die ausführliche
       Beschreibung. Seit den Aufgaben-Blöcken (index v1.36.0) kann die
       Beschreibung je Fahrzeug in der Zelle stehen (assign.task); die
       Stations-Ebene (station.task) bleibt als Altformat-Fallback. Leere Felder
       erzeugen KEINEN Platzhalter. */
    var taskText = (assign && nonEmpty(assign.task)) ? assign.task
                 : (nonEmpty(station.task) ? station.task : "");
    var aufgabeInner =
      (nonEmpty(station.title) ? '<div class="aufgabe-text">'+escapeHTML(station.title)+'</div>' : '') +
      (nonEmpty(taskText)      ? '<div class="task">'+escapeHTML(taskText)+'</div>'              : '');
    var aufgabeCard = aufgabeInner
      ? '<div class="card"><div class="label">Aufgabe</div>'+aufgabeInner+'</div>'
      : '';

    /* Aufgabe + Lagebild nebeneinander; fehlt das Lagebild – oder ist es für diese
       Station bewusst ausgeblendet (hideLagebild) – nimmt die Aufgabe die volle
       Breite ein (kein Grid-Wrapper). */
    var imgsHtml = station.hideLagebild===true ? "" : lagebildHtml(station,fhz);
    var mainArea = imgsHtml
      ? '<div class="grid">'+aufgabeCard+'<div class="card"><div class="label">Lagebild</div>'+imgsHtml+'</div></div>'
      : aufgabeCard;

    /* Freischalt-Vor-Gate: die Besatzung löst das FHZ-Rätsel vor Ort und gibt die
       „Antwort der Besatzung" ein (Freitext oder Auswahl); zusätzlich – falls
       hinterlegt – das von der ELW heruntergefunkte „Rückwort des ELW". Erst wenn
       alle hinterlegten Wörter stimmen, erscheint das Positionscode-Feld.
       Fehlen beide Hashes → kein Gate, Code-Feld direkt sichtbar. */
    var riddleFhz = assign && typeof assign.riddleFhz==="string" ? assign.riddleFhz : "";
    var fhzMode   = assign && assign.fhzMode==="choice" ? "choice" : "text";
    var fhzOptions= assign && Array.isArray(assign.fhzOptions) ? assign.fhzOptions : [];
    var hashFhz   = assign && typeof assign.hashFhz==="string"  ? assign.hashFhz  : "";
    var hashElw   = assign && typeof assign.hashElw==="string"  ? assign.hashElw  : "";
    var needFhz   = nonEmpty(hashFhz);
    var needElw   = nonEmpty(hashElw);
    /* Multiple-Choice-Fragen (Aufgabentyp „mc"): an der Station beantwortet die
       Besatzung alle Fragen; erst dann erscheint das Positionscode-Feld. Seit den
       Aufgaben-Blöcken (index v1.36.0) können die Fragen je Fahrzeug in der Zelle
       stehen (assign.mc.questions); die Stations-Ebene (station.mc.questions) bleibt
       als Altformat-Fallback. Je Frage Optionen (Klartext) + Hash der richtigen
       Option. */
    var mcSource = (assign && assign.mc && Array.isArray(assign.mc.questions)) ? assign.mc.questions
                 : (station.mc && Array.isArray(station.mc.questions)) ? station.mc.questions
                 : [];
    var mcQuestions = mcSource.filter(function(q){ return q && nonEmpty(q.q) && Array.isArray(q.options) && q.options.length>0 && nonEmpty(q.hash); });
    var needMc    = mcQuestions.length>0;
    /* Mastercode der Übungsleitung (Override): nicht offen sichtbar, erst über einen
       dezenten Button einblendbar. Korrekt → Lösungszeichen direkt, ohne Gate/Code. */
    var masterHash = (data.meta && typeof data.meta.masterCode==="string") ? data.meta.masterCode : "";
    var needMaster = nonEmpty(masterHash);
    /* Funkaufträge: relaySend = Wörter, die DIESE Besatzung an andere funkt (Anzeige,
       kein Gate). relayRecv = Wörter, die ihr von anderen gefunkt werden und hier zur
       Freischaltung des Codes eingegeben werden müssen (Gate, nur Hash hinterlegt). */
    var relaySend = (assign && Array.isArray(assign.relaySend)) ? assign.relaySend.filter(function(x){ return x && nonEmpty(x.word); }) : [];
    var relayRecv = (assign && Array.isArray(assign.relayRecv)) ? assign.relayRecv.filter(function(x){ return x && nonEmpty(x.hash); }) : [];
    var needRelay = relayRecv.length>0;
    var needGate  = needFhz || needElw || needMc || needRelay;
    /* Die Karte „Freischaltung" zeigt nur FHZ-Rätsel und ELW-Rückwort. Sie wird
       daher NUR gebaut, wenn eine der beiden Seiten hinterlegt ist – MC- und
       Funkwort-Gates haben eigene Karten (sonst bliebe hier eine leere Kachel). */
    var gateCard = "";
    if(needFhz || needElw){
      var fhzPart = "";
      if(needFhz){
        var fhzAnswer = (fhzMode==="choice")
          ? '<div class="gate-opts" id="fhzOpts">'+fhzOptions.map(function(o){
              return '<button type="button" class="gate-opt" data-opt="'+escapeAttr(o)+'">'+escapeHTML(o)+'</button>';
            }).join("")+'</div>'
          : '<div class="code-row" id="fhzRow">'+
              '<input type="text" id="fhzInput" placeholder="Antwort der Besatzung" autocomplete="off" spellcheck="false">'+
              '<button type="button" class="btn" id="fhzBtn">Prüfen</button>'+
            '</div>';
        fhzPart =
          '<div class="gate-part">'+
            (nonEmpty(riddleFhz)?'<div class="task">'+escapeHTML(riddleFhz)+'</div>':'')+
            '<p class="gate-hint">Löse die Aufgabe vor Ort und gib die Antwort der Besatzung ein.</p>'+
            fhzAnswer+
            '<p class="code-msg" id="fhzMsg" role="status" aria-live="polite"></p>'+
          '</div>';
      }
      var elwPart = "";
      if(needElw){
        elwPart =
          '<div class="gate-part">'+
            '<p class="gate-hint">Die Einsatzleitung funkt dir das Rückwort des ELW herunter – gib es hier ein.</p>'+
            '<div class="code-row" id="elwRow">'+
              '<input type="text" id="elwInput" placeholder="Rückwort des ELW" autocomplete="off" spellcheck="false">'+
              '<button type="button" class="btn" id="elwBtn">Prüfen</button>'+
            '</div>'+
            '<p class="code-msg" id="elwMsg" role="status" aria-live="polite"></p>'+
          '</div>';
      }
      gateCard =
        '<div class="card gate-card" id="gateCard">'+
          '<div class="label">Freischaltung</div>'+
          fhzPart+elwPart+
        '</div>';
    }

    /* Multiple-Choice-Fragen-Karte (eigenes Gate). */
    var mcCard = "";
    if(needMc){
      mcCard =
        '<div class="card mc-card" id="mcCard">'+
          '<div class="label">Fragen</div>'+
          '<p class="gate-hint">Beantworte alle Fragen richtig, um den Positionscode freizuschalten.</p>'+
          mcQuestions.map(function(q,qi){
            return '<div class="gate-part mc-q" data-qi="'+qi+'">'+
              '<div class="task">'+escapeHTML(q.q)+'</div>'+
              '<div class="gate-opts" data-qi="'+qi+'">'+
                q.options.map(function(o){ return '<button type="button" class="gate-opt" data-opt="'+escapeAttr(o)+'">'+escapeHTML(o)+'</button>'; }).join("")+
              '</div>'+
              '<p class="code-msg" data-qmsg="'+qi+'" role="status" aria-live="polite"></p>'+
            '</div>';
          }).join("")+
        '</div>';
    }

    /* Funkauftrag-Sender-Karte: zeigt das/die Wörter, die diese Besatzung an andere
       durchfunken soll (parallel zur Aufgabe, kein Gate). */
    var relaySendCard = "";
    if(relaySend.length){
      relaySendCard =
        '<div class="card relay-send-card">'+
          '<div class="label">Funkauftrag</div>'+
          relaySend.map(function(rs){
            return '<div class="relay-send">'+
              '<p class="gate-hint">Gib folgendes Wort per Funk an <b>'+escapeHTML(rs.to||"den Empfänger")+'</b> durch:</p>'+
              '<div class="relay-word">'+escapeHTML(rs.word)+'</div>'+
            '</div>';
          }).join("")+
        '</div>';
    }

    /* Funkauftrag-Empfänger-Karte (Gate): das per Funk erhaltene Wort eingeben. */
    var relayCard = "";
    if(needRelay){
      relayCard =
        '<div class="card relay-recv-card" id="relayCard">'+
          '<div class="label">Funkwort eingeben</div>'+
          relayRecv.map(function(rr,ri){
            return '<div class="gate-part">'+
              '<p class="gate-hint">Welches Wort wurde dir von <b>'+escapeHTML(rr.from||"einem anderen Fahrzeug")+'</b> gefunkt?</p>'+
              '<div class="code-row">'+
                '<input type="text" data-relayinput="'+ri+'" placeholder="Gefunktes Wort" autocomplete="off" spellcheck="false">'+
                '<button type="button" class="btn" data-relaybtn="'+ri+'">Prüfen</button>'+
              '</div>'+
              '<p class="code-msg" data-relaymsg="'+ri+'" role="status" aria-live="polite"></p>'+
            '</div>';
          }).join("")+
        '</div>';
    }

    /* Mastercode-Karte: nur ein dezenter Button; das Eingabefeld bleibt verborgen,
       bis die Übungsleitung den Button antippt. */
    var masterCard = "";
    if(needMaster){
      masterCard =
        '<div class="master-card" id="masterCard">'+
          '<button type="button" class="master-toggle" id="masterToggle" aria-expanded="false">Übungsleitung</button>'+
          '<div class="master-box" id="masterBox" hidden>'+
            '<div class="code-row">'+
              '<input type="password" id="masterInput" placeholder="Mastercode" autocomplete="off" spellcheck="false">'+
              '<button type="button" class="btn" id="masterBtn">Freischalten</button>'+
            '</div>'+
            '<p class="code-msg" id="masterMsg" role="status" aria-live="polite"></p>'+
          '</div>'+
        '</div>';
    }

    document.getElementById("content").innerHTML=
      '<div class="topbar"><div class="st-no">'+escapeHTML(String(laufnr))+'</div>'+
        '<div><h1>'+escapeHTML(ort)+'</h1>'+
        '<div class="veh"><b>'+escapeHTML(vehicle.type||vehicle.id)+'</b>'+(nonEmpty(vehicle.callsign)?' · '+escapeHTML(vehicle.callsign):'')+'</div></div></div>'+
      mainArea+
      relaySendCard+
      gateCard+
      mcCard+
      relayCard+
      '<div class="card code-card" id="codeCard"'+(needGate?' style="display:none"':'')+'>'+
        '<div class="label">Lösungszeichen</div>'+
        '<div class="code-row" id="codeRow">'+
          '<input type="text" id="codeInput" placeholder="Positionscode eingeben" autocomplete="off" autocapitalize="characters" spellcheck="false">'+
          '<button type="button" class="btn" id="codeBtn">Freischalten</button>'+
        '</div>'+
        '<p class="code-msg" id="codeMsg" role="status" aria-live="polite"></p>'+
        '<div id="letterReveal"></div>'+
      '</div>'+
      masterCard;

    var expected = normCode(assign && assign.code);

    var input = document.getElementById("codeInput");
    var btn = document.getElementById("codeBtn");
    var msg = document.getElementById("codeMsg");

    function setMsg(t,k){ msg.textContent=t||""; msg.className="code-msg"+(k?" "+k:""); }

    function revealLetter(){
      var ch = assign && typeof assign.char==="string" ? assign.char : "";
      var cls="letter", txt;
      if(ch===""){cls+=" empty";txt="–";}
      else if(ch===" "){cls+=" space";txt="␣";}
      else txt=ch;
      document.getElementById("letterReveal").innerHTML=
        '<div class="letterbox"><div class="'+cls+'">'+escapeHTML(txt)+'</div>'+
        '<div class="letter-note">Lösungszeichen für <b>'+escapeHTML(vehicle.type||vehicle.id)+'</b> an <b>Station '+escapeHTML(String(laufnr))+'</b>. Bitte notieren.</div></div>';
      var row=document.getElementById("codeRow"); if(row) row.style.display="none";
    }

    function tryUnlock(){
      var val=normCode(input.value);
      if(!val){ setMsg("Bitte den Positionscode eingeben.","warn"); return; }
      if(!expected){ setMsg("Für diese Station ist (noch) kein Positionscode hinterlegt.","warn"); return; }
      if(val===expected){ setMsg("Positionscode korrekt – Lösungszeichen freigeschaltet.","ok"); revealLetter(); }
      else { setMsg("Positionscode stimmt nicht. Bitte erneut prüfen.","warn"); }
    }
    btn.addEventListener("click", tryUnlock);
    input.addEventListener("keydown", function(e){ if(e.key==="Enter"){ e.preventDefault(); tryUnlock(); } });

    var salt=saltFromMeta(data.meta);

    /* Vor-Gate: „Antwort der Besatzung" (FHZ), „Rückwort des ELW" (ELW) und/oder
       Multiple-Choice-Fragen. Erst wenn alles stimmt → Positionscode-Feld. */
    if(needGate){
      var fhzOK=!needFhz, elwOK=!needElw, mcOK=!needMc, relayOK=!needRelay;
      function revealCode(){
        if(!(fhzOK&&elwOK&&mcOK&&relayOK)) return;
        var cc=document.getElementById("codeCard"); if(cc) cc.style.display="";
        if(input) input.focus();
      }
      if(needFhz){
        var fhzMsg=document.getElementById("fhzMsg");
        function setFhzMsg(t,k){ if(fhzMsg){ fhzMsg.textContent=t||""; fhzMsg.className="code-msg"+(k?" "+k:""); } }
        function passFhz(){ fhzOK=true; setFhzMsg("Antwort korrekt.","ok"); revealCode(); }
        if(fhzMode==="choice"){
          var opts=document.getElementById("fhzOpts");
          if(opts) opts.addEventListener("click", function(e){
            var b=e.target.closest(".gate-opt"); if(!b||fhzOK) return;
            if(hashWord(b.getAttribute("data-opt"), salt)===hashFhz){
              b.classList.add("correct");
              var all=opts.querySelectorAll(".gate-opt"); for(var i=0;i<all.length;i++){ all[i].disabled=true; }
              passFhz();
            } else { b.classList.add("wrong"); setFhzMsg("Das stimmt nicht. Bitte erneut versuchen.","warn"); }
          });
        } else {
          var fInput=document.getElementById("fhzInput");
          var fBtn=document.getElementById("fhzBtn");
          function tryFhz(){
            if(!normWord(fInput.value)){ setFhzMsg("Bitte die Antwort der Besatzung eingeben.","warn"); return; }
            if(hashWord(fInput.value, salt)===hashFhz){
              var fr=document.getElementById("fhzRow"); if(fr) fr.style.display="none";
              passFhz();
            } else { setFhzMsg("Antwort stimmt nicht. Bitte erneut prüfen.","warn"); }
          }
          if(fBtn) fBtn.addEventListener("click", tryFhz);
          if(fInput) fInput.addEventListener("keydown", function(e){ if(e.key==="Enter"){ e.preventDefault(); tryFhz(); } });
        }
      }
      if(needElw){
        var eInput=document.getElementById("elwInput");
        var eBtn=document.getElementById("elwBtn");
        var elwMsg=document.getElementById("elwMsg");
        function setElwMsg(t,k){ if(elwMsg){ elwMsg.textContent=t||""; elwMsg.className="code-msg"+(k?" "+k:""); } }
        function tryElw(){
          if(!normWord(eInput.value)){ setElwMsg("Bitte das Rückwort des ELW eingeben.","warn"); return; }
          if(hashWord(eInput.value, salt)===hashElw){
            setElwMsg("Wort korrekt.","ok");
            var er=document.getElementById("elwRow"); if(er) er.style.display="none";
            elwOK=true; revealCode();
          } else { setElwMsg("Wort stimmt nicht. Bitte erneut prüfen.","warn"); }
        }
        if(eBtn) eBtn.addEventListener("click", tryElw);
        if(eInput) eInput.addEventListener("keydown", function(e){ if(e.key==="Enter"){ e.preventDefault(); tryElw(); } });
      }
      if(needMc){
        var mcSolved = mcQuestions.map(function(){ return false; });
        function checkAllMc(){
          for(var i=0;i<mcSolved.length;i++){ if(!mcSolved[i]) return; }
          mcOK=true; revealCode();
        }
        mcQuestions.forEach(function(q,qi){
          var optsEl=document.querySelector('.gate-opts[data-qi="'+qi+'"]');
          var qMsg=document.querySelector('[data-qmsg="'+qi+'"]');
          function setQMsg(t,k){ if(qMsg){ qMsg.textContent=t||""; qMsg.className="code-msg"+(k?" "+k:""); } }
          if(optsEl) optsEl.addEventListener("click", function(e){
            var b=e.target.closest(".gate-opt"); if(!b||mcSolved[qi]) return;
            if(hashWord(b.getAttribute("data-opt"), salt)===q.hash){
              b.classList.add("correct");
              var all=optsEl.querySelectorAll(".gate-opt"); for(var i=0;i<all.length;i++){ all[i].disabled=true; }
              mcSolved[qi]=true; setQMsg("Richtig.","ok"); checkAllMc();
            } else { b.classList.add("wrong"); setQMsg("Das stimmt nicht. Bitte erneut versuchen.","warn"); }
          });
        });
      }
      if(needRelay){
        var relaySolved = relayRecv.map(function(){ return false; });
        function checkAllRelay(){
          for(var i=0;i<relaySolved.length;i++){ if(!relaySolved[i]) return; }
          relayOK=true; revealCode();
        }
        relayRecv.forEach(function(rr,ri){
          var rInput=document.querySelector('[data-relayinput="'+ri+'"]');
          var rBtn=document.querySelector('[data-relaybtn="'+ri+'"]');
          var rMsg=document.querySelector('[data-relaymsg="'+ri+'"]');
          function setRMsg(t,k){ if(rMsg){ rMsg.textContent=t||""; rMsg.className="code-msg"+(k?" "+k:""); } }
          function tryRelay(){
            if(relaySolved[ri]) return;
            if(!normWord(rInput.value)){ setRMsg("Bitte das gefunkte Wort eingeben.","warn"); return; }
            if(hashWord(rInput.value, salt)===rr.hash){
              relaySolved[ri]=true; setRMsg("Wort korrekt.","ok");
              rInput.disabled=true; if(rBtn) rBtn.disabled=true;
              checkAllRelay();
            } else { setRMsg("Wort stimmt nicht. Bitte erneut prüfen.","warn"); }
          }
          if(rBtn) rBtn.addEventListener("click", tryRelay);
          if(rInput) rInput.addEventListener("keydown", function(e){ if(e.key==="Enter"){ e.preventDefault(); tryRelay(); } });
        });
      }
    }

    /* Mastercode-Override der Übungsleitung: dezenter Button blendet das Eingabefeld
       ein; korrekter Code → Lösungszeichen direkt (überspringt Gate + Positionscode). */
    if(needMaster){
      var mToggle=document.getElementById("masterToggle");
      var mBox=document.getElementById("masterBox");
      var mInput=document.getElementById("masterInput");
      var mBtn=document.getElementById("masterBtn");
      var mMsg=document.getElementById("masterMsg");
      function setMasterMsg(t,k){ if(mMsg){ mMsg.textContent=t||""; mMsg.className="code-msg"+(k?" "+k:""); } }
      if(mToggle) mToggle.addEventListener("click", function(){
        var open=mBox.hasAttribute("hidden");
        if(open){ mBox.removeAttribute("hidden"); mToggle.setAttribute("aria-expanded","true"); if(mInput) mInput.focus(); }
        else { mBox.setAttribute("hidden",""); mToggle.setAttribute("aria-expanded","false"); }
      });
      function tryMaster(){
        if(!nonEmpty(mInput.value)){ setMasterMsg("Bitte den Mastercode eingeben.","warn"); return; }
        if(hashWord(mInput.value, salt)===masterHash){
          setMasterMsg("Freigeschaltet – Lösungszeichen sichtbar.","ok");
          var gc=document.getElementById("gateCard"); if(gc) gc.style.display="none";
          var mcc=document.getElementById("mcCard"); if(mcc) mcc.style.display="none";
          var rc=document.getElementById("relayCard"); if(rc) rc.style.display="none";
          var cc=document.getElementById("codeCard"); if(cc) cc.style.display="";
          revealLetter();
        } else { setMasterMsg("Mastercode stimmt nicht.","warn"); }
      }
      if(mBtn) mBtn.addEventListener("click", tryMaster);
      if(mInput) mInput.addEventListener("keydown", function(e){ if(e.key==="Enter"){ e.preventDefault(); tryMaster(); } });
    }
  }

  function processWrapper(w){
    var txt;
    if(w&&w.format==="b64"&&typeof w.payload==="string")txt=decodeBase64Utf8(w.payload);
    else if(w&&w.data)txt=JSON.stringify(w.data);
    else throw new Error("format");
    var data=JSON.parse(txt);
    if(!data||!Array.isArray(data.stations))throw new Error("structure");
    return data;
  }
  function run(data){
    var s=getParam("s"),fhz=getParam("fhz");
    if(!nonEmpty(s)||!nonEmpty(fhz)){showError("Aufruf unvollständig","Diese Seite wird über einen QR-Code geöffnet und benötigt <code>s</code> (Stationsnummer) und <code>fhz</code> (Fahrzeug). Beispiel: <code>station.html?s=1&amp;fhz=elw</code>");return;}
    var sNum=parseInt(s,10);
    var station=(data.stations||[]).filter(function(st){return Number(st.nr)===sNum;})[0];
    var vehicle=(data.vehicles||[]).filter(function(v){return v.id===fhz;})[0];
    if(!station){showError("Station nicht gefunden","Für <code>s="+escapeHTML(String(s))+"</code> gibt es keine Station in den Übungsdaten.");return;}
    if(!vehicle){showError("Fahrzeug nicht gefunden","Für <code>fhz="+escapeHTML(String(fhz))+"</code> gibt es kein Fahrzeug in den Übungsdaten.");return;}
    render(data, station, vehicle, fhz);
  }
  /* --- Lagebild-Lightbox ----------------------------------------------------
     Öffnet das angetippte/angeklickte Lagebild als Vollbild. Tap auf Tablet/
     Handy löst denselben click aus → funktioniert touch wie Maus. Schließen:
     Tipp/Klick irgendwo im Overlay, ×-Button oder Escape. */
  function openLightbox(src, alt){
    var lb=document.getElementById("lb"), img=document.getElementById("lbImg");
    if(!lb||!img||!nonEmpty(src)) return;
    img.src=src; img.alt=alt||"Lagebild";
    lb.classList.add("open"); lb.setAttribute("aria-hidden","false");
    document.body.style.overflow="hidden";
  }
  function closeLightbox(){
    var lb=document.getElementById("lb"), img=document.getElementById("lbImg");
    if(!lb||!lb.classList.contains("open")) return;
    lb.classList.remove("open"); lb.setAttribute("aria-hidden","true");
    if(img) img.removeAttribute("src");
    document.body.style.overflow="";
  }
  function initLightbox(){
    var lb=document.getElementById("lb");
    if(!lb) return;
    lb.addEventListener("click", closeLightbox); /* Tipp/Klick irgendwo im Overlay schließt */
    /* Delegation: übersteht das Neu-Rendern des Inhalts. */
    document.addEventListener("click", function(e){
      var t=e.target;
      if(t&&t.classList&&t.classList.contains("lb-trigger")) openLightbox(t.getAttribute("src"), t.getAttribute("alt"));
    });
    document.addEventListener("keydown", function(e){
      var t=e.target;
      if((e.key==="Enter"||e.key===" ")&&t&&t.classList&&t.classList.contains("lb-trigger")){ e.preventDefault(); openLightbox(t.getAttribute("src"), t.getAttribute("alt")); return; }
      if(e.key==="Escape") closeLightbox();
    });
  }

  function start(){
    var ft=document.getElementById("stFoot"); if(ft) ft.textContent="Stationsoberfläche · Version "+STATION_APP_INFO.version;
    initLightbox();
    if(typeof fetch==="undefined"){showError("Nicht unterstützt","Dieser Browser kann die Übungsdaten nicht laden.");return;}
    fetch("data/uebung.json",{cache:"no-store"})
      .then(function(r){if(!r.ok)throw new Error("http "+r.status);return r.json();})
      .then(function(w){ run(processWrapper(w)); })
      .catch(function(){ showError("Übungsdaten konnten nicht geladen werden","Die Datei <code>data/uebung.json</code> fehlt, ist ungültig oder noch nicht generiert."); });
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",start);else start();
})();
</script>
