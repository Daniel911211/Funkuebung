<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ELW-Koordination – Funkübung</title>
<!--
  ============================================================================
  FUNKÜBUNG – ELW-KOORDINATION (elw.html)
  ============================================================================
  Version: 1.4.0 (eigene Versionierung, unabhängig von APP_INFO.version des
  Planungstools; zentral in ELW_APP_INFO.version, im Footer sichtbar).
  Versionsverlauf: siehe CHANGELOG.md.
  ============================================================================
  Aufruf:  elw.html            (alle aktiven Fahrzeuge)
           elw.html?fhz=elw    (nur ein Fahrzeug)

  Lesende Schwesterseite zu station.html für die Einsatzleitung/Übungsleitung.
  Lädt data/uebung.json und zeigt je Fahrzeug die Route als Dispositionsliste:
  Laufnummer · Einsatzort · Positionscode (verdeckt, per Klick) · Status
  (offen → Auftrag erteilt → erledigt). Der ELW gibt der Besatzung bei
  erledigter Aufgabe den Positionscode durch; diese schaltet damit an
  station.html ihr Lösungszeichen frei.

  WICHTIG: Diese Seite zeigt NIEMALS den Lösungssatz oder das Lösungszeichen
  (assignments[..].char) – nur Positionscodes. Status wird ausschließlich
  LOKAL im Browser (localStorage) gespeichert, keine Online-Übertragung.
  index.html und station.html werden nicht berührt.
  ============================================================================
-->
<style>
  /* Token-WERTE = :root von index.html (Styleguide in CLAUDE.md); Namen der
     Flächen-Tokens ebenfalls übernommen. --ok/--warn entsprechen den
     Statusfarben --status-done/--status-prog des Planungstools. */
  :root {
    --bg:#16181c; --bg-2:#1b1e23; --surface:#23272e; --surface-2:#2a2f37; --input-bg:#1d2026;
    --line:#353b44; --line-soft:#2c313a; --text:#e8eaed; --text-muted:#99a0aa; --text-faint:#6b727c;
    --red:#861619; --red-strong:#a11f27; --red-soft:rgba(134,22,25,.18); --ok:#3fae6b; --warn:#e0a32e; --btn-ok:#2f9e60;
    --radius:10px; --radius-sm:7px;
    --font:"Segoe UI","Roboto","Helvetica Neue",system-ui,-apple-system,sans-serif;
    --font-mono:"Consolas","SF Mono","Roboto Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1040px;margin:0 auto;padding:18px 16px 44px;}
  .meta{font-size:.82rem;color:var(--text-faint);text-align:center;margin-bottom:12px;}

  .elw-top{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 16px;padding:14px 18px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);position:relative;overflow:hidden;margin-bottom:16px;}
  .elw-top::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);}
  .elw-title{font-size:1.3rem;font-weight:700;}
  .elw-sub{font-size:.95rem;color:var(--text-muted);}
  .elw-sub b{color:var(--text);}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;}
  .label{font-size:.74rem;letter-spacing:.09em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px;}
  .muted{font-size:.95rem;color:var(--text-faint);font-style:italic;}
  .elw-note{margin:0 0 14px;font-size:.86rem;color:var(--text-muted);line-height:1.5;}

  /* Funkkanäle */
  table.chan{width:100%;border-collapse:collapse;font-size:1.02rem;}
  table.chan th{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);text-align:left;padding:6px 12px;border-bottom:1px solid var(--line);}
  table.chan td{padding:11px 12px;border-bottom:1px solid var(--line-soft);font-family:var(--font-mono);font-weight:600;color:var(--text);}
  table.chan td.chan-nr{color:var(--text-muted);width:7em;white-space:nowrap;font-family:var(--font);font-weight:600;}
  table.chan tbody tr:hover{background:var(--surface-2);}
  table.chan tr:last-child td{border-bottom:none;}

  /* Fahrzeugkarten */
  .veh{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;}
  .veh:last-child{margin-bottom:0;}
  .veh-head{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 12px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line-soft);}
  .veh-title{font-size:1.05rem;font-weight:700;color:var(--text);}
  .veh-sub{font-size:.92rem;color:var(--text-muted);}
  .veh-reset{margin-left:auto;}
  .route{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
  .erow{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line-soft);border-radius:var(--radius-sm);background:var(--surface);}
  .erow.is-done{opacity:.6;}
  .erow-empty{opacity:.85;padding:8px 2px;}
  .lauf{flex:0 0 auto;width:34px;height:34px;border-radius:8px;background:var(--red-soft);border:1px solid var(--red);display:grid;place-items:center;font-family:var(--font-mono);font-weight:800;font-size:1.05rem;color:#fff;}
  .erow-main{flex:1 1 150px;min-width:0;}
  .addr{display:block;font-size:1rem;color:var(--text);font-weight:600;line-height:1.3;}
  .erow-riddle{display:block;margin-top:6px;}
  .erow-task{flex:1 1 130px;min-width:0;font-size:.92rem;color:var(--text-muted);line-height:1.3;}
  .erow-task-label{display:block;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);margin-bottom:1px;}
  .erow-code{flex:0 0 auto;min-width:128px;text-align:right;}
  .code{font-family:var(--font-mono);font-size:1.1rem;letter-spacing:.04em;color:var(--ok);font-weight:700;}
  .code.none{color:var(--text-faint);font-weight:400;font-style:italic;font-size:.85rem;}
  .elw-riddle-btn{font-size:.78rem;}
  .elw-relay{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
  .elw-relay-hint{font-size:.76rem;color:var(--text-faint);line-height:1.3;}
  .elw-relay-row{display:flex;gap:6px;align-items:center;}
  .elw-relay-input{font:inherit;font-size:.85rem;padding:6px 8px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--input-bg);color:var(--text);width:140px;max-width:46vw;}
  .elw-relay-msg{font-size:.74rem;min-height:1em;}
  .elw-relay-msg.warn{color:var(--warn);}
  .erow-act{flex:0 0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:8px;justify-content:flex-end;}

  /* ELW-Rätsel-Overlay */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:18px;z-index:50;}
  .ov.open{display:flex;}
  .ov-card{position:relative;max-width:520px;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;max-height:90vh;overflow:auto;}
  .ov-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--text-muted);font-size:1.6rem;line-height:1;cursor:pointer;}
  .ov-close:hover{color:var(--text);}
  .ov-label{font-size:.74rem;letter-spacing:.09em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
  .ov-sub{font-size:.9rem;color:var(--text-muted);margin-bottom:8px;}
  .ov-riddle{font-size:1.15rem;line-height:1.5;color:var(--text);}
  .ov-opts{margin:12px 0 0;padding-left:20px;}
  .ov-opts li{font-size:1rem;color:var(--text);margin:4px 0;}
  .ov-hint{margin:14px 0 0;font-size:.86rem;color:var(--text-muted);line-height:1.5;}

  .btn-mini{font:inherit;font-size:.82rem;font-weight:600;padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--surface);color:var(--text);cursor:pointer;transition:background .14s,border-color .14s,filter .14s;}
  .btn-mini:hover{background:var(--surface-2);}
  .btn-give{background:var(--red);border-color:var(--red);color:#fff;}
  .btn-give:hover{background:var(--red-strong);border-color:var(--red-strong);}
  .btn-done{background:var(--btn-ok);border-color:var(--btn-ok);color:#fff;}
  .btn-done:hover{filter:brightness(1.08);background:var(--btn-ok);}
  .btn-reset,.veh-reset{font-size:.78rem;padding:5px 10px;color:var(--text-muted);}
  .badge{font-size:.8rem;font-weight:600;padding:4px 9px;border-radius:999px;white-space:nowrap;}
  .badge-prog{background:rgba(224,163,46,.16);color:var(--warn);border:1px solid rgba(224,163,46,.5);}
  .badge-ok{background:rgba(63,174,107,.16);color:var(--ok);border:1px solid rgba(63,174,107,.5);}

  .error{margin-top:16px;background:var(--red-soft);border:1px solid var(--red);border-radius:var(--radius);padding:16px 18px;}
  .error h2{margin:0 0 6px;font-size:1.05rem;color:var(--red-strong);}
  .error p{margin:0;font-size:.95rem;color:var(--text-muted);}
  .error code{font-family:var(--font-mono);color:var(--text);background:var(--bg-2);padding:1px 5px;border-radius:4px;}
  .foot{margin-top:22px;text-align:center;font-size:.74rem;color:var(--text-faint);}

  @media (max-width:560px){
    .erow-task{flex-basis:100%;}
    .erow-code{min-width:0;text-align:left;flex-basis:100%;}
    .erow-act{flex-basis:100%;justify-content:flex-start;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="meta" id="exMeta"></div>
    <div id="content"><p class="muted">Lade Übungsdaten …</p></div>
    <div class="foot" id="elwFoot">ELW-Koordination</div>
  </div>
  <div class="ov" id="ov" aria-hidden="true" role="dialog" aria-label="ELW-Rätsel">
    <div class="ov-card">
      <button type="button" class="ov-close" id="ovClose" aria-label="Schließen">&times;</button>
      <div class="ov-label">ELW-Rätsel</div>
      <div id="ovBody"></div>
    </div>
  </div>
<script>
(function () {
  "use strict";
  /* Eigene Version der ELW-Koordination (unabhängig vom Planungstool). */
  var ELW_APP_INFO = { name: "ELW-Koordination", version: "1.4.0" };
  var STATUS_KEY = "funkuebung_elw_status_v1";

  var EX = null;            /* geladene Übungsdaten */
  var revealed = {};        /* aufgedeckte Positionscodes (nur Sitzung): "fhz/nr" -> true */

  /* ---- Hilfsfunktionen (wie station.html) ---- */
  function escapeHTML(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
  function escapeAttr(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function fmtDate(d){var s=String(d==null?"":d).trim();var m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(s);return m?(m[3]+"."+m[2]+"."+m[1]):s;}
  function nonEmpty(v){return v!=null&&String(v).trim()!=="";}
  function getParam(n){try{return new URLSearchParams(window.location.search).get(n);}catch(e){return null;}}
  function decodeBase64Utf8(b64){var bin=atob(b64),by=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)by[i]=bin.charCodeAt(i);return new TextDecoder("utf-8").decode(by);}
  function showError(t,d){document.getElementById("content").innerHTML='<div class="error"><h2>'+escapeHTML(t)+'</h2><p>'+d+'</p></div>';}

  /* Hash-Helfer (identisch zu index/station): nur für das Funkauftrag-Gate, bei dem
     die ELW das von der Besatzung hochgefunkte Wort eingibt → Code wird frei. */
  function normWord(s){return String(s==null?"":s).toLowerCase().replace(/\s+/g,"");}
  function saltFromMeta(meta){var m=meta||{};return (m.name||"")+"|"+(m.date||"");}
  function hashWord(word,salt){
    var str=String(salt==null?"":salt)+""+normWord(word);
    var h1=0xdeadbeef,h2=0x41c6ce57,i,ch;
    for(i=0;i<str.length;i++){ch=str.charCodeAt(i);h1=Math.imul(h1^ch,2654435761);h2=Math.imul(h2^ch,1597334677);}
    h1=Math.imul(h1^(h1>>>16),2246822507);h1^=Math.imul(h2^(h2>>>13),3266489909);
    h2=Math.imul(h2^(h2>>>16),2246822507);h2^=Math.imul(h1^(h1>>>13),3266489909);
    return ("00000000"+(h2>>>0).toString(16)).slice(-8)+("00000000"+(h1>>>0).toString(16)).slice(-8);
  }

  /* Hinweis: elw.html prüft KEIN Freischalt-Wort mehr. Die Wort-Gates (Antwort der
     Besatzung / Rückwort des ELW) liegen auf station.html. Hier wird das ELW-Rätsel
     nur angezeigt (Overlay), damit die ELW es lösen und das Rückwort runterfunken
     kann. Weiterhin: NIE Lösungssatz/char – nur Positionscodes. */

  function processWrapper(w){
    var txt;
    if(w&&w.format==="b64"&&typeof w.payload==="string")txt=decodeBase64Utf8(w.payload);
    else if(w&&w.data)txt=JSON.stringify(w.data);
    else throw new Error("format");
    var data=JSON.parse(txt);
    if(!data||!Array.isArray(data.stations))throw new Error("structure");
    return data;
  }

  /* ---- Status (lokal je Gerät) ---- */
  function exKey(){ var m=(EX&&EX.meta)?EX.meta:{}; return (m.name||"")+"|"+(m.date||""); }
  function loadStatusAll(){ try{ return JSON.parse(localStorage.getItem(STATUS_KEY))||{}; }catch(e){ return {}; } }
  function saveStatusAll(o){ try{ localStorage.setItem(STATUS_KEY, JSON.stringify(o)); }catch(e){} }
  function getRowState(fhz,nr){ var ex=loadStatusAll()[exKey()]||{}; return ex[fhz+"/"+nr]||0; }
  function setRowState(fhz,nr,state){ var all=loadStatusAll(),k=exKey(),ex=all[k]||{}; if(state){ ex[fhz+"/"+nr]=state; } else { delete ex[fhz+"/"+nr]; } all[k]=ex; saveStatusAll(all); }
  function resetVehicle(fhz){ var all=loadStatusAll(),k=exKey(),ex=all[k]||{}; Object.keys(ex).forEach(function(key){ if(key.indexOf(fhz+"/")===0) delete ex[key]; }); all[k]=ex; saveStatusAll(all); }

  /* ---- Funkkanäle ---- */
  function channelsHtml(channels){
    if(!Array.isArray(channels)||channels.length===0){
      return '<p class="muted">Funkkanäle sind in dieser Datei nicht enthalten. Bitte im Planungstool unter „Druck / Export" die Stationsdaten neu exportieren (ab Version 1.31.0) und data/uebung.json hochladen.</p>';
    }
    var rows=channels.map(function(c,i){
      return '<tr><td class="chan-nr">Kanal '+(i+1)+'</td><td>'+(nonEmpty(c.tmo)?escapeHTML(c.tmo):"–")+'</td><td>'+(nonEmpty(c.dmo)?escapeHTML(c.dmo):"–")+'</td></tr>';
    }).join("");
    return '<table class="chan"><thead><tr><th>NR</th><th>TMO</th><th>DMO</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  /* ---- Fahrzeug-/Routenanzeige ---- */
  function stationByNr(nr){ return (EX.stations||[]).filter(function(s){return Number(s.nr)===Number(nr);})[0]; }

  function erowHtml(v, r){
    var st=stationByNr(r.nr)||{};
    var addr=nonEmpty(st.address)?st.address:"Einsatzort nicht hinterlegt";
    var aufg=nonEmpty(st.title)?st.title:"–";
    var codeDirect=st.elwCodeDirect===true;
    var key=v.id+"/"+r.nr;
    var state=getRowState(v.id, r.nr);

    /* Positionscode: bei „Code direkt" sofort sichtbar, sonst erst per Klick.
       Kein Wort-Gate mehr auf elw.html – die Wörter werden auf station.html geprüft. */
    var hasRelay = r.relayElw && nonEmpty(r.relayElw.hash);
    var codeCell;
    if(!nonEmpty(r.code)) codeCell='<span class="code none">kein Code</span>';
    else if(revealed[key]) codeCell='<span class="code">'+escapeHTML(r.code)+'</span>';
    else if(hasRelay) codeCell=
      '<div class="elw-relay">'+
        '<span class="elw-relay-hint">Wort von <b>'+escapeHTML(r.relayElw.from||"der Besatzung")+'</b> eingeben:</span>'+
        '<span class="elw-relay-row">'+
          '<input type="text" class="elw-relay-input" placeholder="Hochgefunktes Wort" autocomplete="off" spellcheck="false">'+
          '<button type="button" class="btn-mini" data-relay-check data-fhz="'+escapeAttr(v.id)+'" data-nr="'+escapeAttr(String(r.nr))+'">Prüfen</button>'+
        '</span>'+
        '<span class="elw-relay-msg" aria-live="polite"></span>'+
      '</div>';
    else if(codeDirect) codeCell='<span class="code">'+escapeHTML(r.code)+'</span>';
    else codeCell='<button type="button" class="btn-mini" data-code-show data-fhz="'+escapeAttr(v.id)+'" data-nr="'+escapeAttr(String(r.nr))+'">Code anzeigen</button>';

    /* ELW-Rätsel: die ELW löst es und funkt das Rückwort des ELW nach unten.
       Anzeige per Overlay (Button), die Prüfung passiert auf station.html. */
    var riddleBtn = nonEmpty(r.riddleElw)
      ? '<button type="button" class="btn-mini elw-riddle-btn" data-riddle data-fhz="'+escapeAttr(v.id)+'" data-nr="'+escapeAttr(String(r.nr))+'">ELW-Rätsel anzeigen</button>'
      : '';

    var actCell;
    if(state===2) actCell='<span class="badge badge-ok">erledigt ✓</span><button type="button" class="btn-mini btn-reset" data-act data-to="0" data-fhz="'+escapeAttr(v.id)+'" data-nr="'+escapeAttr(String(r.nr))+'">zurücksetzen</button>';
    else if(state===1) actCell='<span class="badge badge-prog">erteilt ✓</span><button type="button" class="btn-mini btn-done" data-act data-to="2" data-fhz="'+escapeAttr(v.id)+'" data-nr="'+escapeAttr(String(r.nr))+'">erledigt</button>';
    else actCell='<button type="button" class="btn-mini btn-give" data-act data-to="1" data-fhz="'+escapeAttr(v.id)+'" data-nr="'+escapeAttr(String(r.nr))+'">Auftrag erteilt</button>';

    return '<li class="erow'+(state===2?" is-done":"")+'">'+
             '<span class="lauf">'+escapeHTML(String(r.laufnr))+'</span>'+
             '<span class="erow-main"><span class="addr">'+escapeHTML(addr)+'</span>'+(riddleBtn?'<span class="erow-riddle">'+riddleBtn+'</span>':'')+'</span>'+
             '<span class="erow-task"><span class="erow-task-label">Aufgabe</span>'+escapeHTML(aufg)+'</span>'+
             '<span class="erow-code">'+codeCell+'</span>'+
             '<span class="erow-act">'+actCell+'</span>'+
           '</li>';
  }

  function vehicleRowsHtml(v){
    var amap=(EX.assignments&&EX.assignments[v.id])?EX.assignments[v.id]:{};
    var nrs=Object.keys(amap);
    if(!nrs.length) return '<li class="muted erow-empty">Keine Stationszuordnungen für dieses Fahrzeug.</li>';
    var rows=nrs.map(function(k){ var a=amap[k]||{}; return { nr:Number(k), laufnr:(typeof a.laufnr==="number"?a.laufnr:9999), code:a.code||"", riddleElw:a.riddleElw||"", relayElw:(a.relayElw&&typeof a.relayElw==="object")?a.relayElw:null }; });
    rows.sort(function(a,b){ return a.laufnr-b.laufnr; });
    return rows.map(function(r){ return erowHtml(v, r); }).join("");
  }

  function renderVehicles(){
    var host=document.getElementById("fhzList");
    if(!host) return;
    var vehicles=Array.isArray(EX.vehicles)?EX.vehicles:[];
    var only=getParam("fhz");
    if(only) vehicles=vehicles.filter(function(v){return v.id===only;});
    if(!vehicles.length){ host.innerHTML='<p class="muted">'+(only?"Fahrzeug nicht in den Übungsdaten enthalten.":"Keine aktiven Fahrzeuge in den Übungsdaten.")+'</p>'; return; }
    host.innerHTML=vehicles.map(function(v){
      return '<div class="veh">'+
               '<div class="veh-head">'+
                 '<div class="veh-title">'+escapeHTML(v.type||v.id)+'</div>'+
                 '<div class="veh-sub">'+escapeHTML(v.callsign||"")+'</div>'+
                 '<button type="button" class="btn-mini veh-reset" data-vreset data-fhz="'+escapeAttr(v.id)+'">Status zurücksetzen</button>'+
               '</div>'+
               '<ol class="route">'+vehicleRowsHtml(v)+'</ol>'+
             '</div>';
    }).join("");
  }

  function render(data){
    EX=data;
    var m=data.meta||{};
    var head=[];
    if(nonEmpty(m.name)) head.push(escapeHTML(m.name));
    if(nonEmpty(m.date)) head.push(escapeHTML(fmtDate(m.date)));
    if(nonEmpty(m.time)) head.push(escapeHTML(m.time)+" Uhr");
    document.getElementById("exMeta").innerHTML=head.join(" · ");
    var leaderLine=nonEmpty(m.leader)?'<div class="elw-sub">Übungsleitung: <b>'+escapeHTML(m.leader)+'</b></div>':'';

    document.getElementById("content").innerHTML=
      '<div class="elw-top"><div class="elw-title">ELW-Koordination</div>'+leaderLine+'</div>'+
      '<div class="card"><div class="label">Funkkanäle</div>'+channelsHtml(m.channels)+'</div>'+
      '<div class="card"><div class="label">Fahrzeuge &amp; Aufträge</div>'+
        '<p class="elw-note">Der Positionscode ist das, was die Besatzung zur Freischaltung an der Station benötigt – ihn der Crew per Funk durchgeben. „Code anzeigen" blendet ihn ein (Stationen mit „Code direkt" zeigen ihn sofort). Hat eine Station ein ELW-Rätsel, dieses über „ELW-Rätsel anzeigen" öffnen, lösen und das <b>Rückwort des ELW</b> nach unten funken. Verlangt eine Station ein <b>hochgefunktes Funkwort</b>, dieses von der Besatzung erfragen und im Feld eingeben – dann wird der Code frei. Der Status (Auftrag erteilt / erledigt) wird nur auf diesem Gerät gespeichert.</p>'+
        '<div id="fhzList"></div>'+
      '</div>';
    renderVehicles();
  }

  /* ---- ELW-Rätsel-Overlay ---- */
  function openRiddle(fhz, nr){
    var amap=(EX.assignments&&EX.assignments[fhz])?EX.assignments[fhz]:{};
    var a=amap[nr]||{};
    if(!nonEmpty(a.riddleElw)) return;
    var st=stationByNr(nr)||{};
    var optsHtml="";
    if(a.elwMode==="choice" && Array.isArray(a.elwOptions) && a.elwOptions.length){
      optsHtml='<ul class="ov-opts">'+a.elwOptions.map(function(o){ return '<li>'+escapeHTML(o)+'</li>'; }).join("")+'</ul>';
    }
    document.getElementById("ovBody").innerHTML=
      '<div class="ov-sub">'+escapeHTML(nonEmpty(st.title)?st.title:("Station "+nr))+'</div>'+
      '<div class="ov-riddle">'+escapeHTML(a.riddleElw)+'</div>'+
      optsHtml+
      '<p class="ov-hint">Lösen und das <b>Rückwort des ELW</b> an die Besatzung herunterfunken. Die Besatzung gibt es auf ihrer Stationsseite ein.</p>';
    var ov=document.getElementById("ov");
    ov.classList.add("open"); ov.setAttribute("aria-hidden","false");
    document.body.style.overflow="hidden";
  }
  function closeRiddle(){
    var ov=document.getElementById("ov");
    if(!ov||!ov.classList.contains("open")) return;
    ov.classList.remove("open"); ov.setAttribute("aria-hidden","true");
    document.getElementById("ovBody").innerHTML="";
    document.body.style.overflow="";
  }

  function onContentClick(e){
    var t=e.target.closest("[data-code-show],[data-riddle],[data-act],[data-vreset],[data-relay-check]");
    if(!t) return;
    var fhz=t.getAttribute("data-fhz");
    if(t.hasAttribute("data-relay-check")){
      var nr=t.getAttribute("data-nr"), key=fhz+"/"+nr;
      var box=t.closest(".elw-relay");
      var inp=box?box.querySelector(".elw-relay-input"):null;
      var msg=box?box.querySelector(".elw-relay-msg"):null;
      var a=(EX.assignments&&EX.assignments[fhz])?EX.assignments[fhz][nr]:null;
      var hash=(a&&a.relayElw&&typeof a.relayElw.hash==="string")?a.relayElw.hash:"";
      if(!inp||!nonEmpty(inp.value)){ if(msg){msg.textContent="Bitte das hochgefunkte Wort eingeben.";msg.className="elw-relay-msg warn";} return; }
      if(hash && hashWord(inp.value, saltFromMeta(EX.meta))===hash){ revealed[key]=true; renderVehicles(); }
      else if(msg){ msg.textContent="Wort stimmt nicht. Bitte erneut prüfen."; msg.className="elw-relay-msg warn"; }
      return;
    }
    if(t.hasAttribute("data-code-show")){ revealed[fhz+"/"+t.getAttribute("data-nr")]=true; renderVehicles(); return; }
    if(t.hasAttribute("data-riddle")){ openRiddle(fhz, t.getAttribute("data-nr")); return; }
    if(t.hasAttribute("data-act")){ setRowState(fhz, t.getAttribute("data-nr"), parseInt(t.getAttribute("data-to"),10)); renderVehicles(); return; }
    if(t.hasAttribute("data-vreset")){ if(window.confirm("Status aller Stationen dieses Fahrzeugs zurücksetzen?")){ resetVehicle(fhz); renderVehicles(); } return; }
  }

  function start(){
    var ft=document.getElementById("elwFoot"); if(ft) ft.textContent="ELW-Koordination · Version "+ELW_APP_INFO.version;
    var c=document.getElementById("content"); if(c) c.addEventListener("click", onContentClick);
    var ov=document.getElementById("ov"); if(ov) ov.addEventListener("click", function(e){ if(e.target===ov) closeRiddle(); });
    var ovC=document.getElementById("ovClose"); if(ovC) ovC.addEventListener("click", closeRiddle);
    document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeRiddle(); });
    if(typeof fetch==="undefined"){ showError("Nicht unterstützt","Dieser Browser kann die Übungsdaten nicht laden."); return; }
    fetch("data/uebung.json",{cache:"no-store"})
      .then(function(r){ if(!r.ok)throw new Error("http "+r.status); return r.json(); })
      .then(function(w){ render(processWrapper(w)); })
      .catch(function(){ showError("Übungsdaten konnten nicht geladen werden","Die Datei <code>data/uebung.json</code> fehlt, ist ungültig oder noch nicht generiert."); });
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",start);else start();
})();
</script>
</body>
</html>
